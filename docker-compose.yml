services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=sds-incident-mgmt-secret-change-in-production
      - UPLOAD_DIR=/app/server/uploads
      - DB_PATH=/app/server/db/incident_management.db
    volumes:
      - db-data:/app/server/db
      - uploads-data:/app/server/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads-data:
