<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safelync — SDS Manager</title>
  <link rel="icon" type="image/svg+xml" href="/assets/sds-mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
  <script>
    // Sync the chosen theme onto <html> before paint, so dark mode doesn't
    // flash light on first render. ThemeProvider takes over after mount.
    (function () {
      try {
        var t = localStorage.getItem('sds_theme');
        if (t !== 'light' && t !== 'dark' && t !== 'system') t = 'system';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'system');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
